# docker-compose.yml
version: "3.9"

services:

  nginx:
    image: nginx:alpine
    container_name: lemp-nginx
    restart: unless-stopped
    ports:
      - "88:88"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - php
    networks:
      - lemp-net

  php:
    image: php:8.3-fpm-alpine
    container_name: lemp-php
    restart: unless-stopped
    volumes:
      - ./html:/var/www/html
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
         echo "Cloning src/..."
          apk add --no-cache git
          cd /tmp
          git init
          git remote add origin https://github.com/your-org/your-monorepo.git
          git fetch --depth=1 origin main
          git sparse-checkout init --cone
          git sparse-checkout set src/html
          git checkout main
          apk del git
          mkdir /var/www/html
          cp /tmp/index.php /var/www/html/
          cd /
          cp /tmp/default.conf /etc/nginx/conf.d/
        fi
        exec docker-php-entrypoint php-fpm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lemp-net

  db:
    image: mariadb:11
    container_name: lemp-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootSecret123!
      MYSQL_DATABASE: app_db
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appPass456!
    volumes:
      - dbdata:/var/lib/mysql
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
          echo "Cloning src/..."
          apk add --no-cache git
          cd /tmp
          git init
          git remote add origin https://github.com/your-org/your-monorepo.git
          git fetch --depth=1 origin main
          git sparse-checkout init --cone
          git sparse-checkout set src/
          git checkout main
          apk del git
          rm -rf .git
          mariadb -u root -p rootSecret123! spellbook < /tmp/install.sql
        fi
        exec docker-php-entrypoint php-fpm   
    networks:
      - lemp-net


volumes:
  dbdata:
  nginx-logs:

networks:
  lemp-net:
    driver: bridge
